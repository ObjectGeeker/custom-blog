spring:
  application:
    name: custom-blog
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/custom_blog
    username: root
    password: 123456
  profiles:
    active: local
server:
  servlet:
    context-path: /api

blog:
  security:
    static-image-referer:
      enabled: true
      allowed-hosts:
        - blog.objectgeeker.com
      allow-empty-referer: false
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl